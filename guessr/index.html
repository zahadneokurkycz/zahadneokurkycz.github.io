<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Super smart number guessr</title>
        <script src="index.js" defer></script>
        <script src="./assets/themer.min.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
        <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"></noscript>

        <link rel="icon" type="image/png" href="/guessr/favicons/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/guessr/favicons/favicon.svg" />
        <link rel="shortcut icon" href="/guessr/favicons/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/guessr/favicons/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="MyWebSite" />
        <link rel="manifest" href="/guessr/favicons/site.webmanifest" />
    </head>
    <body onLoad="Themer.init();">
        <div class="container-fluid position-relative p-3">
            <h1>Super smart number guessr</h1>

            <!-- Modal 1 -->
            <div class="modal fade" id="numberwindow" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="numberwindowLabel" aria-hidden="true">
            <div class="modal-dialog">
                <form onsubmit="guess(event);">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="numberwindowLabel">Guessr</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="inputik" class="form-label">Your number:</label>
                            <input type="number" class="form-control" id="inputik" min="0" max="100" placeholder="42" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="reset" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-outline-primary">Guess</button>
                    </div>
                </div>
                </form>
            </div>
            </div>

            <!-- Modal 2 -->
            <div class="modal fade" id="mainwindow" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="mainwindowLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="mainwindowLabel">Guessr</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="setTimeout(() => navigation.reload(), 500);"></button>
                    </div>
                    <div class="modal-body">
                        <p id="pepa">Waiting</p>
                        <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                            <div class="progress-bar" style="width: 0%" id="idk"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-danger" data-bs-dismiss="modal" onclick="setTimeout(() => navigation.reload(), 500);">Cancel</button>
                    </div>
                </div>
            </div>
            </div>

            <!-- Modal 3 -->
            <div class="modal fade" id="resultwindow" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="resultwindowLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="resultwindowLabel">Guessr</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="setTimeout(() => navigation.reload(), 500);"></button>
                    </div>
                    <div class="modal-body">
                        <p id="result">Waiting</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-danger" data-bs-dismiss="modal" onclick="setTimeout(() => navigation.reload(), 500);">Close</button>
                    </div>
                </div>
            </div>
            </div>

            <script src="./assets/jquery.min.js"></script>
            <script src="./assets/bootstrap.bundle.min.js"></script>
        </div>


        <div class="position-absolute top-50 start-50 translate-middle">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#numberwindow">
                Guess
            </button>
        </div>


        <div class="position-absolute bottom-0 end-0 p-3">
            <themer-btn btnclass="btn btn-secondary"></themer-btn>
        </div>
        <div class="position-absolute bottom-0 start-0 p-3">
            <input type="checkbox" class="btn btn-secondary">
        </div>
    </body>
</html>
